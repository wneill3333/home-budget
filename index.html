<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Budget</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f4f6f8;--card:#fff;--ink:#1a2733;--mut:#6b7a88;--acc:#1f4e78;--green:#1e7d44;--red:#c0392b;--line:#e3e8ed}
*{box-sizing:border-box;margin:0}
body{font:15px/1.45 -apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{background:var(--acc);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
header h1{font-size:17px;flex:1}
nav{display:flex;background:#fff;border-bottom:1px solid var(--line);overflow-x:auto;position:sticky;top:44px;z-index:5}
nav button{flex:1;padding:11px 8px;border:0;background:none;font:inherit;color:var(--mut);border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap}
nav button.on{color:var(--acc);border-color:var(--acc);font-weight:600}
main{max-width:980px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px}
.big{font-size:26px;font-weight:700}
.grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.kpi .lbl{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{color:var(--mut);text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:7px 6px;border-bottom:2px solid var(--line)}
td{padding:7px 6px;border-bottom:1px solid var(--line);vertical-align:middle}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.pos{color:var(--green)}.neg{color:var(--red)}
select,input,button.btn{font:inherit;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:#fff;max-width:100%}
button.btn{background:var(--acc);color:#fff;border:0;cursor:pointer}
button.btn.sec{background:#e8eef4;color:var(--acc)}
.flt{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.flt.stick{position:sticky;top:89px;z-index:4;background:var(--bg);padding:8px 0;margin-bottom:8px;box-shadow:0 4px 6px -4px rgba(0,0,0,.15)}
.totbar{position:sticky;bottom:0;z-index:4;background:#fff9c4;font-weight:700;padding:10px 14px;border:1px solid var(--line);border-radius:8px;margin-top:-1px;display:flex;justify-content:space-between}
.ledger-scroll{max-height:calc(100vh - 212px);overflow:auto;border-radius:10px}
.ledger thead th{position:sticky;top:0;background:var(--card);z-index:2;box-shadow:inset 0 -2px 0 var(--line)}
.ledger tfoot td{position:sticky;bottom:0;background:#fff9c4;font-weight:700;z-index:2;box-shadow:inset 0 2px 0 var(--line)}
.muted{color:var(--mut);font-size:13px}
.desc{max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#login{max-width:360px;margin:60px auto}
#login input{width:100%;margin-bottom:10px}
.bar{height:9px;background:#e3e8ed;border-radius:5px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--acc)}
.warn{background:#fff7e0;border:1px solid #eedc9a;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:13px}
.hide{display:none}
@media(max-width:640px){.desc{max-width:150px}td,th{padding:6px 4px}}
</style>
</head>
<body>
<div id="login" class="card hide">
  <h2 style="margin-bottom:12px">Home Budget — Sign in</h2>
  <input id="em" type="email" placeholder="Email" autocomplete="username">
  <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
  <button class="btn" style="width:100%" onclick="signIn()">Sign in</button>
  <p id="lmsg" class="muted" style="margin-top:10px"></p>
</div>

<div id="app" class="hide">
<header><h1>Home Budget</h1><span id="who" class="muted" style="color:#cfe0ef;font-size:12px"></span>
<button class="btn sec" style="padding:4px 10px;font-size:12px" onclick="setPw()">Password</button>
<button class="btn sec" style="padding:4px 10px;font-size:12px" onclick="sb.auth.signOut()">Out</button></header>
<nav>
<button id="t-dash" class="on" onclick="show('dash')">Dashboard</button>
<button id="t-tx" onclick="show('tx')">Transactions</button>
<button id="t-bk" onclick="show('bk')">Buckets</button>
<button id="t-rp" onclick="show('rp')">Reports</button>
</nav>
<main>
<div id="v-dash"></div>
<div id="v-tx" class="hide"></div>
<div id="v-bk" class="hide"></div>
<div id="v-rp" class="hide"></div>
</main>
</div>

<script>
const URL_='https://tiihzphmvlzvrxdigxan.supabase.co';
const KEY='sb_publishable_uqOSBOvfOo34jFQtI32spg_fItw9lRx';
const sb=supabase.createClient(URL_,KEY);
let subs=[],people=[],accounts=[],cats=[],curView='dash';
const $=id=>document.getElementById(id);
const fmt=n=>{n=+n;const s=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return n<0?`(${s})`:s};
const cls=n=>+n<0?'num neg':'num';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function groupedSubOpts(sel,excl){
 let h='';
 cats.forEach(c=>{
  const list=subs.filter(s=>s.active&&s.id!==excl&&s.categories?.name===c.name);
  if(!list.length)return;
  h+=`<optgroup label="${esc(c.name)}">`+list.map(s=>`<option value="${s.id}" ${sel==s.id?'selected':''}>${esc(s.name)}</option>`).join('')+`</optgroup>`;});
 return h;}

sb.auth.onAuthStateChange((ev,sess)=>{ if(sess){$('login').classList.add('hide');$('app').classList.remove('hide');$('who').textContent=sess.user.email;boot();} else {$('app').classList.add('hide');$('login').classList.remove('hide');} });

async function signIn(){ $('lmsg').textContent='...';
 const {error}=await sb.auth.signInWithPassword({email:$('em').value.trim(),password:$('pw').value});
 $('lmsg').textContent=error?error.message:''; }

async function setPw(){ const p=prompt('New password (min 8 chars):'); if(!p)return;
 const {error}=await sb.auth.updateUser({password:p}); alert(error?error.message:'Password updated.'); }

let booted=false;
async function boot(){ if(booted)return; booted=true;
 const [s,p,a,c]=await Promise.all([
  sb.from('subcategories').select('id,name,monthly_budget,active,categories(name,is_income)').order('name'),
  sb.from('people').select('*').order('id'),
  sb.from('accounts').select('*').order('id'),
  sb.from('categories').select('*').order('name')]);
 subs=s.data||[];people=p.data||[];accounts=a.data||[];cats=c.data||[];
 show('dash'); }

function show(v){ curView=v;
 ['dash','tx','bk','rp'].forEach(x=>{$('v-'+x).classList.toggle('hide',x!==v);$('t-'+x).classList.toggle('on',x===v);});
 ({dash:renderDash,tx:renderTx,bk:renderBk,rp:renderRp})[v](); }

/* ---------- DASHBOARD ---------- */
async function renderDash(){
 const el=$('v-dash'); el.innerHTML='<p class="muted">Loading…</p>';
 const [d,me,st]=await Promise.all([
  sb.from('dashboard').select('*').single(),
  sb.from('months_elapsed').select('*').single(),
  sb.from('settings').select('*')]);
 const dash=d.data||{}, months=me.data?.months||0;
 const asof=(st.data||[]).find(r=>r.key==='balance_asof')?.value||'not set';
 const today=new Date(), mstart=today.toISOString().slice(0,8)+'01';
 const {data:mtx}=await sb.from('transactions').select('amount,person_id,subcategory_id,is_transfer,subcategories(categories(name,is_income))').gte('trans_date',mstart);
 let spent=0,byP={},inc=0;
 (mtx||[]).forEach(t=>{ if(t.is_transfer)return; const isInc=t.subcategories?.categories?.is_income;
  if(isInc){inc+=-t.amount;return;} spent+=+t.amount; const pid=t.person_id||0; byP[pid]=(byP[pid]||0)+ +t.amount; });
 const pname=id=>people.find(p=>p.id==id)?.name||'Unassigned';
 el.innerHTML=`
 ${dash.uncategorized_count>0?`<div class="warn">⚠ ${dash.uncategorized_count} uncategorized transactions — <a href="#" onclick="show('tx');return false">categorize them</a></div>`:''}
 <div class="grid">
  <div class="card kpi"><div class="lbl">Checking balance</div><div class="big">$${fmt(dash.checking_balance)}</div>
   <div class="muted">as of ${esc(asof)} — <a href="#" onclick="editBal();return false">update</a></div></div>
  <div class="card kpi"><div class="lbl">Set aside in buckets</div><div class="big">$${fmt(dash.total_set_aside)}</div>
   <div class="muted">${months} months since Jan 2026</div></div>
  <div class="card kpi"><div class="lbl">Safe to spend</div><div class="big ${+dash.safe_to_spend<0?'neg':'pos'}">$${fmt(dash.safe_to_spend)}</div>
   <div class="muted">checking − buckets</div></div>
 </div>
 <div class="card"><h3 style="margin-bottom:8px">This month</h3>
  <table><tr><th>Spent</th><th class="num">$</th></tr>
  <tr><td>Total spending</td><td class="${cls(spent)}">$${fmt(spent)}</td></tr>
  ${Object.entries(byP).map(([id,v])=>`<tr><td>— ${esc(pname(id))}</td><td class="num">$${fmt(v)}</td></tr>`).join('')}
  <tr><td>Income recorded</td><td class="num pos">$${fmt(inc)}</td></tr></table></div>`;
}
async function editBal(){
 const v=prompt('Current checking balance (e.g. 3450.20):'); if(v===null)return;
 const n=parseFloat(v.replace(/[$,]/g,'')); if(isNaN(n)){alert('Not a number');return;}
 await sb.from('settings').update({value:String(n)}).eq('key','checking_balance');
 await sb.from('settings').update({value:new Date().toISOString().slice(0,10)}).eq('key','balance_asof');
 renderDash(); }

/* ---------- TRANSACTIONS ---------- */
let txFilter={month:'',acct:'',person:'',subcat:'',uncat:false,q:''};
function drillSub(id){ renderLedger(id); }

let ledgerSortDir='asc';
function toggleLedgerSort(id){ ledgerSortDir = ledgerSortDir==='asc'?'desc':'asc'; renderLedger(id); }
/* ---------- SUBCATEGORY LEDGER (drill-down) ---------- */
async function renderLedger(id){
 const el=$('v-bk'); el.innerHTML='<p class="muted">Loading…</p>';
 const sub=subs.find(s=>s.id==id); if(!sub)return renderBk();
 const [tx,adj,me,st,spl]=await Promise.all([
  sb.from('transactions').select('*').eq('subcategory_id',id).order('trans_date'),
  sb.from('bucket_adjustments').select('*').eq('subcategory_id',id),
  sb.from('months_elapsed').select('*').single(),
  sb.from('settings').select('*').eq('key','start_date').single(),
  sb.from('transaction_splits').select('amount,note,transaction_id,transactions(trans_date,description,person_id)').eq('subcategory_id',id)]);
 const months=me.data?.months||0;
 const start=new Date((st.data?.value||'2026-01-01')+'T00:00:00');
 let rows=[];
 for(let m=0;m<months;m++){
  const d=new Date(start.getFullYear(),start.getMonth()+m,1);
  rows.push({d:d.toISOString().slice(0,10),o:0,desc:'BUDGET ALLOTMENT',amt:+sub.monthly_budget,kind:'allot'});}
 (adj.data||[]).forEach(a=>rows.push({d:a.adj_date,o:1,desc:'ADJUSTMENT'+(a.note?' — '+a.note:''),amt:+a.amount,kind:'adj',a}));
 (tx.data||[]).forEach(t=>rows.push({d:t.trans_date,o:2,desc:t.description,amt:-t.amount,kind:'tx',t}));
 (spl.data||[]).forEach(s=>rows.push({d:s.transactions.trans_date,o:2,desc:s.transactions.description+' ⤷ split'+(s.note?' — '+s.note:''),amt:-s.amount,kind:'split',txid:s.transaction_id}));
 rows.sort((a,b)=>a.d<b.d?-1:a.d>b.d?1:a.o-b.o);
 const subOpts=sel=>`<option value="">—</option><option value="T">↔ Transfer</option>`+groupedSubOpts(sel);
 let bal=0;
 rows.forEach(r=>{ bal+=r.amt; r.run=bal; });
 const disp = ledgerSortDir==='desc' ? rows.slice().reverse() : rows;
 let body='';
 disp.forEach(r=>{
  const isTx=r.kind==='tx', isAdj=r.kind==='adj';
  let descCell;
  if(isTx) descCell=`<a href="#" title="Click to edit description" style="text-decoration:underline dotted;color:inherit" onclick="editDesc(${r.t.id},${id},${JSON.stringify(r.t.description).replace(/"/g,'&quot;')});return false">${esc(r.desc)}</a>${r.t.person_id?` <span class="muted">(${esc(people.find(p=>p.id==r.t.person_id)?.name||'')})</span>`:''}`;
  else if(isAdj) descCell=`${esc(r.desc)} <a href="#" title="Edit adjustment (amount, note, date)" onclick="editAdj(${r.a.id},${id},${r.a.amount},${JSON.stringify(r.a.note||'').replace(/"/g,'&quot;')},${JSON.stringify(r.a.adj_date)});return false">✎</a> <a href="#" title="Delete adjustment" class="neg" style="font-weight:700" onclick="delAdj(${r.a.id},${id});return false">✕</a>`;
  else if(r.kind==='split') descCell=`${esc(r.desc)} <a href="#" title="Edit this split" onclick="openSplit(${r.txid},()=>renderLedger(${id}));return false">✂</a>`;
  else descCell=esc(r.desc);
  body+=`<tr${r.kind==='allot'?' style="background:#d4edda"':''}>
   <td style="white-space:nowrap">${r.d}</td>
   <td class="desc" title="${esc(r.desc)}">${descCell}</td>
   <td class="${cls(r.amt)}">$${fmt(r.amt)}</td>
   <td class="${cls(r.run)}" style="font-weight:600">$${fmt(r.run)}</td>
   <td>${isTx?`<a href="#" onclick="editNote(${r.t.id},${id});return false">${r.t.notes?esc(r.t.notes):'<span class=muted>+ note</span>'}</a>`:''}</td>
   <td>${isTx?`<select title="Move to a different subcategory" onchange="moveTxLedger(${r.t.id},this.value,${id})">${subOpts(id)}</select>`:''}</td></tr>`;});
 const totIn=rows.filter(r=>r.amt>0).reduce((s,r)=>s+r.amt,0), totOut=rows.filter(r=>r.amt<0).reduce((s,r)=>s+r.amt,0);
 el.innerHTML=`<div class="flt stick">
  <button class="btn sec" onclick="renderBk()">← Back to Buckets</button>
  <span style="align-self:center;font-weight:700;font-size:16px">${esc(sub.name)}</span>
  <button class="btn" onclick="ledgerAdjust(${id},'${esc(sub.name)}')">+ Adjustment</button>
  <span class="muted" style="align-self:center">$${fmt(sub.monthly_budget)}/month — green rows are allotments. Click the Date header to sort; click a description to edit it; ✎/✕ on adjustments to edit or delete.</span></div>
 <div class="card" style="padding:0;overflow:hidden">
 <div class="ledger-scroll">
 <table class="ledger"><thead><tr><th style="cursor:pointer;user-select:none"><a href="#" title="Click to sort by date" style="text-decoration:none;color:inherit" onclick="toggleLedgerSort(${id});return false">Date ${ledgerSortDir==='asc'?'▲':'▼'}</a></th><th>Description</th><th class="num">Amount</th><th class="num">Balance</th><th>Notes</th><th>Subcategory</th></tr></thead>
 <tbody>${body||'<tr><td colspan=6 class=muted>No activity yet.</td></tr>'}</tbody>
 <tfoot><tr><td></td><td class="desc" title="${esc(sub.name)} — in $${fmt(totIn)} / out $${fmt(totOut)}">${esc(sub.name)} — in $${fmt(totIn)} / out $${fmt(totOut)}</td><td></td><td class="${cls(bal)}">$${fmt(bal)}</td><td colspan="2"></td></tr></tfoot></table></div></div>`; }

async function editDesc(txId,curSub,cur){
 const n=prompt('Edit description:',cur); if(n===null||n===cur)return;
 if(!n.trim())return alert('Description cannot be empty.');
 const {error}=await sb.from('transactions').update({description:n.trim()}).eq('id',txId);
 if(error)return alert(error.message);
 renderLedger(curSub); }

async function ledgerAdjust(id,name){
 const v=prompt(`Adjust "${name}" — positive adds money, negative removes (e.g. 50 or -25):`); if(v===null)return;
 const n=parseFloat(v.replace(/[$,]/g,'')); if(isNaN(n)||n===0)return alert('Enter a non-zero number');
 const today=new Date().toISOString().slice(0,10);
 const dstr=prompt('Date for this adjustment (YYYY-MM-DD):',today); if(dstr===null)return;
 const d=(dstr||'').trim(); if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return alert('Please enter the date as YYYY-MM-DD, e.g. '+today);
 const note=prompt('Note (optional):')||null;
 const {error}=await sb.from('bucket_adjustments').insert({subcategory_id:id,amount:n,note,adj_date:d});
 if(error)return alert(error.message);
 renderLedger(id); }

async function editAdj(adjId,curSub,curAmt,curNote,curDate){
 const v=prompt('Adjustment amount (positive adds, negative removes):',curAmt); if(v===null)return;
 const n=parseFloat(v.replace(/[$,]/g,'')); if(isNaN(n)||n===0)return alert('Enter a non-zero number');
 const dstr=prompt('Date (YYYY-MM-DD):',curDate||''); if(dstr===null)return;
 const d=(dstr||'').trim(); if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return alert('Please enter the date as YYYY-MM-DD');
 const note=prompt('Note:',curNote||''); if(note===null)return;
 const {error}=await sb.from('bucket_adjustments').update({amount:n,note:note||null,adj_date:d}).eq('id',adjId);
 if(error)return alert(error.message);
 renderLedger(curSub); }

async function delAdj(adjId,curSub){
 if(!confirm('Delete this adjustment? The bucket balance will recalculate.'))return;
 const {error}=await sb.from('bucket_adjustments').delete().eq('id',adjId);
 if(error)return alert(error.message);
 renderLedger(curSub); }

async function moveTxLedger(txId,val,curSub){
 if(val==='')return;
 let patch = val==='T'?{is_transfer:true,subcategory_id:null}:{is_transfer:false,subcategory_id:+val};
 const {error}=await sb.from('transactions').update(patch).eq('id',txId);
 if(error)return alert(error.message);
 renderLedger(curSub); }

async function editNote(txId,curSub){
 const n=prompt('Note for this transaction:'); if(n===null)return;
 const {error}=await sb.from('transactions').update({notes:n||null}).eq('id',txId);
 if(error)return alert(error.message);
 renderLedger(curSub); }
async function renderTx(){
 const el=$('v-tx');
 el.innerHTML=`<div class="flt stick">
  <input type="month" id="f-m" value="${txFilter.month}" onchange="txFilter.month=this.value;loadTx()">
  <select id="f-a" onchange="txFilter.acct=this.value;loadTx()"><option value="">All accounts</option>${accounts.map(a=>`<option ${txFilter.acct==a.id?'selected':''} value="${a.id}">${esc(a.name)}</option>`).join('')}</select>
  <select id="f-p" onchange="txFilter.person=this.value;loadTx()"><option value="">Everyone</option>${people.map(p=>`<option ${txFilter.person==p.id?'selected':''} value="${p.id}">${esc(p.name)}</option>`).join('')}</select>
  <select id="f-s" onchange="txFilter.subcat=this.value;loadTx()"><option value="">All subcategories</option>${subs.map(s=>`<option ${txFilter.subcat==s.id?'selected':''} value="${s.id}">${esc(s.name)}</option>`).join('')}</select>
  <label style="align-self:center"><input type="checkbox" ${txFilter.uncat?'checked':''} onchange="txFilter.uncat=this.checked;loadTx()"> uncategorized only</label>
  <input placeholder="search…" value="${esc(txFilter.q)}" onchange="txFilter.q=this.value;loadTx()" style="flex:1;min-width:120px">
  <button class="btn" onclick="addTx()">+ Add</button></div>
  <div class="card" style="padding:0"><div id="txlist" style="overflow-x:auto"><p class="muted" style="padding:12px">Loading…</p></div></div>
  <div id="txtot" class="totbar" style="display:none"></div>`;
 loadTx(); }

async function loadTx(){
 let q=sb.from('transactions').select('*').order('trans_date',{ascending:false}).limit(400);
 if(txFilter.month){const [y,m]=txFilter.month.split('-');const next=m=='12'?`${+y+1}-01-01`:`${y}-${String(+m+1).padStart(2,'0')}-01`;
  q=q.gte('trans_date',`${txFilter.month}-01`).lt('trans_date',next);}
 if(txFilter.acct)q=q.eq('account_id',txFilter.acct);
 if(txFilter.person)q=q.eq('person_id',txFilter.person);
 if(txFilter.subcat)q=q.eq('subcategory_id',txFilter.subcat);
 if(txFilter.uncat)q=q.is('subcategory_id',null).eq('is_transfer',false);
 if(txFilter.q)q=q.ilike('description',`%${txFilter.q}%`);
 const {data,error}=await q;
 if(error){$('txlist').innerHTML=`<p class="neg" style="padding:12px">${esc(error.message)}</p>`;return;}
 let splitMap={};
 const ids=(data||[]).map(t=>t.id);
 if(ids.length){const {data:sp}=await sb.from('transaction_splits').select('*').in('transaction_id',ids);
  (sp||[]).forEach(s=>{(splitMap[s.transaction_id]=splitMap[s.transaction_id]||[]).push(s);});}
 const subName=id=>subs.find(s=>s.id==id)?.name||'?';
 const orderLink=t=>{
  const d=t.description;
  if(t.order_url)return ` <a href="${esc(t.order_url)}" target="_blank" title="Open this order" style="text-decoration:none">🔗</a>`;
  if(/ebay/i.test(d)){const m=d.match(/(\d{2}-\d{5}-\d{5})/);
   return ` <a href="${m?'https://order.ebay.com/ord/show?orderId='+m[1]:'https://www.ebay.com/mye/myebay/purchase'}" target="_blank" title="Open this eBay order" style="text-decoration:none">🔗</a>`;}
  if(/amazon|amzn/i.test(d))return ` <a href="https://www.amazon.com/cpe/yourpayments/transactions" target="_blank" title="Open Amazon Your Transactions — match by date & amount" style="text-decoration:none">🔗</a>`;
  return '';};
 const subOpts=sel=>`<option value="">—</option><option value="T" ${sel==='T'?'selected':''}>↔ Transfer/CC Pmt</option>`+groupedSubOpts(sel);
 const perOpts=sel=>`<option value="">—</option>`+people.map(p=>`<option value="${p.id}" ${sel==p.id?'selected':''}>${esc(p.name)}</option>`).join('');
 $('txlist').innerHTML=`<table><tr><th>Date</th><th>Description</th><th class="num">Amount</th><th>Subcategory</th><th>Person</th><th></th></tr>
 ${(data||[]).map(t=>`<tr>
  <td style="white-space:nowrap">${t.trans_date.slice(5)}·${t.trans_date.slice(2,4)}</td>

  ${splitMap[t.id]?`<tr class="spx-${t.id}" style="display:none;background:#f8fafc"><td></td><td colspan="5" style="padding-left:24px"><a href="#" style="font-weight:600" onclick="openSplit(${t.id});return false">✎ Edit this split</a></td></tr>`:''}`).join('')}

 const tot=$('txtot');
 if(tot){tot.style.display='flex';

function toggleSplit(id){ document.querySelectorAll('.spx-'+id).forEach(r=>r.style.display=r.style.display==='none'?'':'none'); }

/* ---------- SPLIT EDITOR ---------- */
let SPL={tx:null,rows:[]};
async function openSplit(txId,doneFn){
 window.SPLDONE=doneFn||null;
 const [{data:tx},{data:ex}]=await Promise.all([
  sb.from('transactions').select('*').eq('id',txId).single(),
  sb.from('transaction_splits').select('*').eq('transaction_id',txId).order('id')]);
 SPL={tx,rows:(ex||[]).map(s=>({subcategory_id:s.subcategory_id,amount:+s.amount,note:s.note||''}))};
 if(!SPL.rows.length)SPL.rows=[{subcategory_id:tx.subcategory_id||'',amount:'',note:''}];
 drawSplit(); }

function drawSplit(){
 let ov=$('splitov');
 if(!ov){ov=document.createElement('div');ov.id='splitov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:12px';
  document.body.appendChild(ov);}
 const t=SPL.tx, total=Math.abs(+t.amount);
 const alloc=SPL.rows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
 const remain=total-alloc;
 const opts=sel=>`<option value="">— pick —</option>`+groupedSubOpts(sel);
 ov.innerHTML=`<div class="card" style="max-width:560px;width:100%;max-height:90vh;overflow-y:auto">
  <h3 style="margin-bottom:4px">Split transaction</h3>
  <p class="muted" style="margin-bottom:10px">${esc(t.description)} — ${t.trans_date} — total $${fmt(total)}</p>
  ${SPL.rows.map((r,i)=>`<div style="display:flex;gap:6px;margin-bottom:6px">
   <select style="flex:2" onchange="SPL.rows[${i}].subcategory_id=this.value;drawSplit()">${opts(r.subcategory_id)}</select>
   <input style="flex:1;min-width:80px" type="number" step="0.01" placeholder="0.00" value="${r.amount}" onchange="SPL.rows[${i}].amount=this.value;drawSplit()">
   <input style="flex:2" placeholder="note (optional)" value="${esc(r.note)}" onchange="SPL.rows[${i}].note=this.value">
   <button class="btn sec" onclick="SPL.rows.splice(${i},1);drawSplit()">✕</button></div>`).join('')}
  <div style="display:flex;gap:8px;margin:10px 0;flex-wrap:wrap">
   <button class="btn sec" onclick="SPL.rows.push({subcategory_id:'',amount:'',note:''});drawSplit()">+ Row</button>
   <button class="btn sec" onclick="applyTemplate()">Apply template…</button>
   <button class="btn sec" onclick="saveTemplate()">Save as template</button></div>
  <p style="font-weight:600;margin-bottom:10px" class="${remain<0?'neg':''}">Allocated: $${fmt(alloc)} &nbsp; Remaining: $${fmt(remain)} ${remain<0?'— OVER ALLOCATED':''}</p>
  <div style="display:flex;gap:8px">
   <button class="btn" ${remain<0?'disabled style="opacity:.4"':''} onclick="saveSplit()">Save split</button>
   <button class="btn sec" onclick="unsplit()">Remove split</button>
   <button class="btn sec" onclick="$('splitov').remove()">Cancel</button></div></div>`; }

async function saveSplit(){
 const t=SPL.tx, total=Math.abs(+t.amount);
 const rows=SPL.rows.filter(r=>r.subcategory_id&&parseFloat(r.amount)>0);
 if(!rows.length)return alert('Add at least one row with a subcategory and amount.');
 const alloc=rows.reduce((s,r)=>s+parseFloat(r.amount),0);
 if(alloc-total>0.005)return alert(`Over-allocated: $${fmt(alloc)} of $${fmt(total)}.`);
 await sb.from('transaction_splits').delete().eq('transaction_id',t.id);
 const ins=rows.map(r=>({transaction_id:t.id,subcategory_id:+r.subcategory_id,amount:parseFloat(r.amount),note:r.note||null}));
 const {error}=await sb.from('transaction_splits').insert(ins);
 if(error)return alert(error.message);
 await sb.from('transactions').update({subcategory_id:null,is_transfer:false}).eq('id',t.id);
 $('splitov').remove(); (window.SPLDONE||loadTx)(); }

async function unsplit(){
 await sb.from('transaction_splits').delete().eq('transaction_id',SPL.tx.id);
 $('splitov').remove(); (window.SPLDONE||loadTx)(); }

async function saveTemplate(){
 const rows=SPL.rows.filter(r=>r.subcategory_id&&parseFloat(r.amount)>0);
 if(!rows.length)return alert('Nothing to save yet.');
 const name=prompt('Template name (e.g. "Rent check"):'); if(!name)return;
 const items=rows.map(r=>({subcategory_id:+r.subcategory_id,amount:parseFloat(r.amount)}));
 const {error}=await sb.from('split_templates').upsert({name:name.trim(),items},{onConflict:'name'});
 alert(error?error.message:'Template saved.'); }

async function applyTemplate(){
 const {data}=await sb.from('split_templates').select('*').order('name');
 if(!(data||[]).length)return alert('No templates saved yet.');
 const name=prompt('Which template?\n\n'+data.map(t=>'• '+t.name).join('\n'),data[0].name); if(!name)return;
 const tpl=data.find(t=>t.name.toLowerCase()===name.trim().toLowerCase());
 if(!tpl)return alert(`Template "${name}" not found.`);
 SPL.rows=tpl.items.map(i=>({subcategory_id:i.subcategory_id,amount:i.amount,note:''}));
 drawSplit(); }

async function noteTx(id,cur){
 const n=prompt('Note for this transaction:',cur||''); if(n===null)return;
 const {error}=await sb.from('transactions').update({notes:n||null}).eq('id',id);
 if(error)return alert(error.message);
 loadTx(); }

async function updTx(id,field,val){
 let patch={};
 if(field==='sub'){ if(val==='T')patch={is_transfer:true,subcategory_id:null}; else patch={is_transfer:false,subcategory_id:val||null}; }
 else patch={person_id:val||null};
 const {error}=await sb.from('transactions').update(patch).eq('id',id);
 if(error)alert(error.message); }

async function addTx(){
 const d=prompt('Date (YYYY-MM-DD):',new Date().toISOString().slice(0,10)); if(!d)return;
 const desc=prompt('Description:'); if(!desc)return;
 const raw=parseFloat(prompt('Amount (negative = money out/expense, positive = money in/refund):')||''); if(isNaN(raw))return alert('Bad amount');
 const amt=-raw;
 const acct=prompt('Account: '+accounts.map(a=>`${a.id}=${a.name}`).join(', '),'1');
 const {error}=await sb.from('transactions').insert({trans_date:d,description:desc,amount:amt,account_id:+acct||null,uid:crypto.randomUUID().slice(0,16)});
 if(error)alert(error.message); else loadTx(); }

/* ---------- BUCKETS ---------- */
let bkCache=null, openCat=null;
async function renderBk(){
 const el=$('v-bk'); if(!bkCache)el.innerHTML='<p class="muted">Loading…</p>';
 const {data,error}=await sb.from('bucket_status').select('*').order('category').order('subcategory');
 if(error){el.innerHTML=`<p class="neg">${esc(error.message)}</p>`;return;}
 bkCache=data||[]; paintBk(); }

function toggleCat(name){ openCat = openCat===name ? null : name; paintBk(); }

function paintBk(){
 const el=$('v-bk');
 const catId=name=>cats.find(c=>c.name===name)?.id;
 const catSel=(id,cur)=>`<select onchange="moveSub(${id},this.value)" title="Move to another category">${cats.filter(c=>!c.is_income).map(c=>`<option value="${c.id}" ${c.name===cur?'selected':''}>${esc(c.name)}</option>`).join('')}</select>`;
 const groups={};
 bkCache.forEach(r=>{(groups[r.category]=groups[r.category]||[]).push(r);});
 let tot={b:0,btd:0,sp:0,adj:0,bal:0},rows='';
 Object.keys(groups).forEach(cat=>{
  const g=groups[cat];
  const c={b:0,btd:0,sp:0,adj:0,bal:0};
  g.forEach(r=>{c.b+=+r.monthly_budget;c.btd+=+r.budgeted_to_date;c.sp+=+r.spent_to_date;c.adj+=+r.adjustments;c.bal+=+r.balance;});
  tot.b+=c.b;tot.btd+=c.btd;tot.sp+=c.sp;tot.adj+=c.adj;tot.bal+=c.bal;
  const open=openCat===cat;
  rows+=`<tr style="background:#eef3f8;cursor:pointer" onclick="toggleCat('${esc(cat)}')">
   <td colspan="2" style="font-weight:600">${open?'▾':'▸'} ${esc(cat)} <span class="muted">(${g.length})</span>
    <a href="#" title="Rename category" onclick="event.stopPropagation();renameCat(${catId(cat)},'${esc(cat)}');return false">✎</a>
    <a href="#" title="Delete category" class="neg" onclick="event.stopPropagation();delCat(${catId(cat)},'${esc(cat)}',${g.length});return false">✕</a></td>
   <td class="num" style="font-weight:600">$${fmt(c.b)}</td><td class="num">$${fmt(c.btd)}</td><td class="num">$${fmt(c.sp)}</td>
   <td class="num">${c.adj?'$'+fmt(c.adj):'—'}</td>
   <td class="${cls(c.bal)}" style="font-weight:700">$${fmt(c.bal)}</td><td></td></tr>`;
  if(open) g.forEach(r=>{
   rows+=`<tr><td style="padding-left:22px"><a href="#" title="See all transactions in this subcategory" onclick="drillSub(${r.id});return false">${esc(r.subcategory)}</a>
     <a href="#" title="Rename subcategory" class="muted" onclick="renameSub(${r.id},'${esc(r.subcategory)}');return false">✎</a>
     <a href="#" title="Delete subcategory" class="neg" onclick="delSub(${r.id},'${esc(r.subcategory)}');return false">✕</a></td>
    <td>${catSel(r.id,r.category)}</td>
    <td class="num"><a href="#" onclick="editBudget(${r.id},'${esc(r.subcategory)}',${r.monthly_budget});return false">$${fmt(r.monthly_budget)}</a></td>
    <td class="num">$${fmt(r.budgeted_to_date)}</td><td class="num">$${fmt(r.spent_to_date)}</td>
    <td class="num"><a href="#" title="Adjustment history" onclick="bucketLog(${r.id},'${esc(r.subcategory)}');return false">${+r.adjustments?'$'+fmt(r.adjustments):'—'}</a></td>
    <td class="${cls(r.balance)}" style="font-weight:600">$${fmt(r.balance)}</td>
    <td style="white-space:nowrap"><button class="btn sec" style="padding:2px 8px" title="Add/remove money" onclick="adjustBucket(${r.id},'${esc(r.subcategory)}')">+/−</button>
     <button class="btn sec" style="padding:2px 8px" title="Transfer to another bucket" onclick="transferBucket(${r.id},'${esc(r.subcategory)}')">⇆</button></td></tr>`; });
 });
 cats.filter(c=>!c.is_income&&!groups[c.name]).forEach(c=>{
  rows+=`<tr style="background:#fdf6ec"><td colspan="2" style="font-weight:600">▸ ${esc(c.name)} <span class="muted">(empty)</span>
   <a href="#" title="Rename category" onclick="renameCat(${c.id},'${esc(c.name)}');return false">✎</a>
   <a href="#" title="Delete category" class="neg" onclick="delCat(${c.id},'${esc(c.name)}',0);return false">✕</a></td>
   <td colspan="6" class="muted">no subcategories</td></tr>`;});
 el.innerHTML=`<div class="flt stick">
  <button class="btn" onclick="addCat()">+ Category</button>
  <button class="btn" onclick="addSub()">+ Subcategory</button>
  <span class="muted" style="align-self:center">Click a category to open it. Inside: click a subcategory for its ledger, ✎ to rename, $ to edit, +/− to adjust, ⇆ to transfer.</span></div>
 <div class="card" style="overflow-x:auto"><p class="muted" style="margin-bottom:8px">Each bucket accrues its monthly amount since Jan 2026; spending draws it down.</p>
 <table><tr><th>Category / Subcategory</th><th></th><th class="num">Monthly</th><th class="num">Budgeted to date</th><th class="num">Spent</th><th class="num">Adjust</th><th class="num">Balance</th><th></th></tr>
 ${rows}<tr style="font-weight:700;background:#f0f6ef"><td>TOTAL</td><td></td><td class="num">$${fmt(tot.b)}</td><td class="num">$${fmt(tot.btd)}</td><td class="num">$${fmt(tot.sp)}</td><td class="num">$${fmt(tot.adj)}</td><td class="${cls(tot.bal)}">$${fmt(tot.bal)}</td><td></td></tr></table></div>`; }

async function adjustBucket(id,name){
 const v=prompt(`Adjust "${name}" — positive adds money, negative removes (e.g. 50 or -25):`); if(v===null)return;
 const n=parseFloat(v.replace(/[$,]/g,'')); if(isNaN(n)||n===0)return alert('Enter a non-zero number');
 const note=prompt('Note (optional):')||null;
 const {error}=await sb.from('bucket_adjustments').insert({subcategory_id:id,amount:n,note});
 if(error)return alert(error.message);
 renderBk(); }

function transferBucket(id,name){
 window.TRF={id,name};
 const ov=document.createElement('div'); ov.id='trfov';
 ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:12px';
 ov.innerHTML=`<div class="card" style="max-width:420px;width:100%">
  <h3 style="margin-bottom:10px">Transfer from "${esc(name)}"</h3>
  <label class="muted" style="font-size:12px">Amount to move</label>
  <input id="trf-amt" type="number" step="0.01" placeholder="0.00" style="width:100%;margin-bottom:8px">
  <label class="muted" style="font-size:12px">Into which bucket</label>
  <select id="trf-target" style="width:100%;margin-bottom:8px">${groupedSubOpts(null,id)}</select>
  <input id="trf-note" placeholder="Note (optional)" style="width:100%;margin-bottom:12px">
  <div style="display:flex;gap:8px"><button class="btn" onclick="confirmTransfer()">Transfer</button>
  <button class="btn sec" onclick="$('trfov').remove()">Cancel</button></div></div>`;
 document.body.appendChild(ov); $('trf-amt').focus(); }

async function confirmTransfer(){
 const {id,name}=window.TRF;
 const n=Math.abs(parseFloat($('trf-amt').value)); if(isNaN(n)||n===0)return alert('Enter an amount');
 const tid=+$('trf-target').value, tname=subs.find(s=>s.id===tid)?.name||'?';
 const note=$('trf-note').value.trim();
 const e1=await sb.from('bucket_adjustments').insert({subcategory_id:id,amount:-n,note:`→ ${tname}${note?' — '+note:''}`});
 if(e1.error)return alert(e1.error.message);
 const e2=await sb.from('bucket_adjustments').insert({subcategory_id:tid,amount:n,note:`← ${name}${note?' — '+note:''}`});
 if(e2.error)return alert(e2.error.message);
 $('trfov').remove(); renderBk(); }

async function bucketLog(id,name){
 const {data,error}=await sb.from('bucket_adjustments').select('*').eq('subcategory_id',id).order('created_at',{ascending:false}).limit(50);
 if(error)return alert(error.message);
 if(!(data||[]).length)return alert(`No adjustments for "${name}" yet.`);
 alert(`Adjustments — ${name}\n\n`+data.map(a=>`${a.adj_date}  ${a.amount>0?'+':''}$${fmt(a.amount)}  ${a.note||''}`).join('\n')); }

async function editBudget(id,name,cur){
 const v=prompt(`Monthly budget for "${name}":`,cur); if(v===null)return;
 const n=parseFloat(v.replace(/[$,]/g,'')); if(isNaN(n))return alert('Not a number');
 const {error}=await sb.from('subcategories').update({monthly_budget:n}).eq('id',id);
 if(error)alert(error.message); else {const s=subs.find(x=>x.id==id);if(s)s.monthly_budget=n;renderBk();} }

async function refreshMeta(){
 const [s,c]=await Promise.all([
  sb.from('subcategories').select('id,name,monthly_budget,active,categories(name,is_income)').order('name'),
  sb.from('categories').select('*').order('name')]);
 subs=s.data||subs; cats=c.data||cats; }

async function renameCat(id,old){

function addSub(){

 ov.innerHTML=`<div class="card" style="max-width:420px;width:100%">

  <label class="muted" style="font-size:12px">Monthly budget</label>

async function saveNewSub(){

async function delCat(id,name,subCount){
 if(subCount>0)return alert(`"${name}" still contains ${subCount} subcategor${subCount==1?'y':'ies'}. Move or delete them first, then delete the category.`);
 if(!confirm(`Delete category "${name}"?`))return;
 const {error}=await sb.from('categories').delete().eq('id',id);
 if(error)return alert(error.message);
 await refreshMeta(); renderBk(); }

async function delSub(id,name){
 const [tx,sp,adj]=await Promise.all([
  sb.from('transactions').select('id',{count:'exact',head:true}).eq('subcategory_id',id),
  sb.from('transaction_splits').select('id',{count:'exact',head:true}).eq('subcategory_id',id),
  sb.from('bucket_adjustments').select('id',{count:'exact',head:true}).eq('subcategory_id',id)]);
 const nTx=tx.count||0, nSp=sp.count||0, nAdj=adj.count||0;
 if(nTx+nSp===0){
  if(!confirm(`Delete subcategory "${name}"?${nAdj?` Its ${nAdj} adjustment(s) will also be deleted.`:''}`))return;
  await sb.from('bucket_adjustments').delete().eq('subcategory_id',id);
  await sb.from('rules').delete().eq('subcategory_id',id);
  const {error}=await sb.from('subcategories').delete().eq('id',id);
  if(error)return alert(error.message);
  await refreshMeta(); renderBk(); return; }
 window.MV={id,name,nTx,nSp,nAdj};
 const ov=document.createElement('div'); ov.id='mvov';
 ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:12px';
 ov.innerHTML=`<div class="card" style="max-width:460px;width:100%">
  <h3 style="margin-bottom:6px">Delete "${esc(name)}"</h3>
  <p class="muted" style="margin-bottom:10px">It has ${nTx} transaction(s), ${nSp} split piece(s), and ${nAdj} adjustment(s). Pick where to move them — then "${esc(name)}" will be deleted.</p>
  <label class="muted" style="font-size:12px">Move everything to</label>
  <select id="mv-target" style="width:100%;margin-bottom:12px">${groupedSubOpts(null,id)}</select>
  <div style="display:flex;gap:8px"><button class="btn" onclick="confirmDelSub()">Move &amp; delete</button>
  <button class="btn sec" onclick="$('mvov').remove()">Cancel</button></div></div>`;
 document.body.appendChild(ov); }

async function confirmDelSub(){
 const {id,name}=window.MV, target=+$('mv-target').value;
 let e;
 e=(await sb.from('transactions').update({subcategory_id:target}).eq('subcategory_id',id)).error; if(e)return alert(e.message);
 e=(await sb.from('transaction_splits').update({subcategory_id:target}).eq('subcategory_id',id)).error; if(e)return alert(e.message);
 e=(await sb.from('bucket_adjustments').update({subcategory_id:target}).eq('subcategory_id',id)).error; if(e)return alert(e.message);
 e=(await sb.from('rules').update({subcategory_id:target}).eq('subcategory_id',id)).error; if(e)return alert(e.message);
 e=(await sb.from('subcategories').delete().eq('id',id)).error; if(e)return alert(e.message);
 $('mvov').remove(); await refreshMeta(); renderBk(); }

async function moveSub(id,newCatId){
 const {error}=await sb.from('subcategories').update({category_id:+newCatId}).eq('id',id);
 if(error)return alert(error.message);
 await refreshMeta(); renderBk(); }

/* ---------- REPORTS ---------- */
async function renderRp(){
 const el=$('v-rp'); el.innerHTML='<p class="muted">Loading…</p>';
 const [{data,error},{data:spl}]=await Promise.all([
  sb.from('transactions').select('id,trans_date,amount,is_transfer,person_id,subcategories(name,monthly_budget,categories(name,is_income))').eq('is_transfer',false),
  sb.from('transaction_splits').select('transaction_id,amount,subcategories(name,categories(name,is_income)),transactions(trans_date,person_id)')]);
 if(error){el.innerHTML=`<p class="neg">${esc(error.message)}</p>`;return;}
 const splitParents=new Set((spl||[]).map(s=>s.transaction_id));
 const byMC={},months=new Set(),byMP={};
 (spl||[]).forEach(s=>{ const c=s.subcategories?.categories; if(c?.is_income)return;
  const m=s.transactions.trans_date.slice(0,7); months.add(m);
  const cat=c?.name||'(uncategorized)';
  byMC[cat]=byMC[cat]||{}; byMC[cat][m]=(byMC[cat][m]||0)+ +s.amount;
  const p=s.transactions.person_id||0; byMP[p]=byMP[p]||{}; byMP[p][m]=(byMP[p][m]||0)+ +s.amount; });
 (data||[]).forEach(t=>{ if(splitParents.has(t.id))return;
  const c=t.subcategories?.categories; if(c?.is_income)return;
  const m=t.trans_date.slice(0,7); months.add(m);
  const cat=c?.name||'(uncategorized)';
  byMC[cat]=byMC[cat]||{}; byMC[cat][m]=(byMC[cat][m]||0)+ +t.amount;
  const p=t.person_id||0; byMP[p]=byMP[p]||{}; byMP[p][m]=(byMP[p][m]||0)+ +t.amount; });
 const ms=[...months].sort();
 const pname=id=>people.find(p=>p.id==id)?.name||'Unassigned';
 const cats=Object.keys(byMC).sort((a,b)=>{const ta=ms.reduce((s,m)=>s+(byMC[a][m]||0),0),tb=ms.reduce((s,m)=>s+(byMC[b][m]||0),0);return tb-ta;});
 const maxTot=Math.max(...cats.map(c=>ms.reduce((s,m)=>s+(byMC[c][m]||0),0)),1);
 el.innerHTML=`<div class="card" style="overflow-x:auto"><h3 style="margin-bottom:8px">Spending by category by month</h3>
 <table><tr><th>Category</th>${ms.map(m=>`<th class="num">${m}</th>`).join('')}<th class="num">Total</th><th style="width:30%"></th></tr>
 ${cats.map(c=>{const tot=ms.reduce((s,m)=>s+(byMC[c][m]||0),0);
  return `<tr><td>${esc(c)}</td>${ms.map(m=>`<td class="num">${byMC[c][m]?'$'+fmt(byMC[c][m]):''}</td>`).join('')}
  <td class="num" style="font-weight:600">$${fmt(tot)}</td><td><div class="bar"><i style="width:${Math.round(tot/maxTot*100)}%"></i></div></td></tr>`;}).join('')}
 </table></div>
 <div class="card" style="overflow-x:auto"><h3 style="margin-bottom:8px">Spending by person by month</h3>
 <table><tr><th>Person</th>${ms.map(m=>`<th class="num">${m}</th>`).join('')}<th class="num">Total</th></tr>
 ${Object.keys(byMP).map(p=>{const tot=ms.reduce((s,m)=>s+(byMP[p][m]||0),0);
  return `<tr><td>${esc(pname(p))}</td>${ms.map(m=>`<td class="num">${byMP[p][m]?'$'+fmt(byMP[p][m]):''}</td>`).join('')}<td class="num" style="font-weight:600">$${fmt(tot)}</td></tr>`;}).join('')}
 </table></div>`; }
</script>
</body>
</html>
