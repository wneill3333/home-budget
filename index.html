<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Budget</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{--bg:#f4f6f8;--card:#fff;--ink:#1a2733;--mut:#6b7a88;--acc:#1f4e78;--green:#1e7d44;--red:#c0392b;--line:#e3e8ed}
*{box-sizing:border-box;margin:0}
body{font:15px/1.45 -apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{background:var(--acc);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
header h1{font-size:17px;flex:1}
nav{display:flex;background:#fff;border-bottom:1px solid var(--line);overflow-x:auto;position:sticky;top:44px;z-index:5}
nav button{flex:1;padding:11px 8px;border:0;background:none;font:inherit;color:var(--mut);border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap}
nav button.on{color:var(--acc);border-color:var(--acc);font-weight:600}
main{max-width:980px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px}
.big{font-size:26px;font-weight:700}
.grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.kpi .lbl{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{color:var(--mut);text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:7px 6px;border-bottom:2px solid var(--line)}
td{padding:7px 6px;border-bottom:1px solid var(--line);vertical-align:middle}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.pos{color:var(--green)}.neg{color:var(--red)}
select,input,button.btn{font:inherit;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:#fff;max-width:100%}
button.btn{background:var(--acc);color:#fff;border:0;cursor:pointer}
button.btn.sec{background:#e8eef4;color:var(--acc)}
.flt{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.flt.stick{position:sticky;top:89px;z-index:4;background:var(--bg);padding:8px 0;margin-bottom:8px;box-shadow:0 4px 6px -4px rgba(0,0,0,.15)}
.totbar{position:sticky;bottom:0;z-index:4;background:#fff9c4;font-weight:700;padding:10px 14px;border:1px solid var(--line);border-radius:8px;margin-top:-1px;display:flex;justify-content:space-between}
.ledger-scroll{max-height:calc(100vh - 212px);overflow:auto;border-radius:10px}
.ledger thead th{position:sticky;top:0;background:var(--card);z-index:2;box-shadow:inset 0 -2px 0 var(--line)}
.ledger tfoot td{position:sticky;bottom:0;background:#fff9c4;font-weight:700;z-index:2;box-shadow:inset 0 2px 0 var(--line)}
.muted{color:var(--mut);font-size:13px}
.desc{max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#login{max-width:360px;margin:60px auto}
#login input{width:100%;margin-bottom:10px}
.bar{height:9px;background:#e3e8ed;border-radius:5px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--acc)}
.warn{background:#fff7e0;border:1px solid #eedc9a;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:13px}
.hide{display:none}
.piecat{cursor:pointer;border-radius:4px}.piecat:hover{background:#eef3f8}
@media(max-width:640px){.desc{max-width:150px}td,th{padding:6px 4px}}
</style>
</head>
<body>
<div id="login" class="card hide">
  <h2 style="margin-bottom:12px">Home Budget — Sign in</h2>
  <input id="em" type="email" placeholder="Email" autocomplete="username">
  <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
  <button class="btn" style="width:100%" onclick="signIn()">Sign in</button>
  <p id="lmsg" class="muted" style="margin-top:10px"></p>
</div>

<div id="app" class="hide">
<header><h1>Home Budget <span id="ver" style="font-size:11px;font-weight:400;color:#cfe0ef;opacity:.85"></span></h1><span id="who" class="muted" style="color:#cfe0ef;font-size:12px"></span>
<button class="btn sec" style="padding:4px 10px;font-size:12px" onclick="setPw()">Password</button>
<button class="btn sec" style="padding:4px 10px;font-size:12px" onclick="sb.auth.signOut()">Out</button></header>
<nav>
<button id="t-dash" class="on" onclick="show('dash')">Dashboard</button>
<button id="t-tx" onclick="show('tx')">Transactions</button>
<button id="t-bk" onclick="show('bk')">Buckets</button>
<button id="t-rp" onclick="show('rp')">Reports</button>
</nav>
<main>
<div id="v-dash"></div>
<div id="v-tx" class="hide"></div>
<div id="v-bk" class="hide"></div>
<div id="v-rp" class="hide"></div>
</main>
</div>

<script>
const URL_='https://tiihzphmvlzvrxdigxan.supabase.co';
const KEY='sb_publishable_uqOSBOvfOo34jFQtI32spg_fItw9lRx';
const sb=supabase.createClient(URL_,KEY);
const APP_VERSION='2026.06.13-17';
(function(){const v=document.getElementById('ver');if(v)v.textContent='v'+APP_VERSION;})();
(async function checkForUpdate(){
 try{
  const r=await fetch('version.json?cb='+Date.now(),{cache:'no-store'});
  if(!r.ok)return;
  const j=await r.json();
  if(j&&j.version&&j.version!==APP_VERSION){
   const cur=new URLSearchParams(location.search).get('v');
   if(cur!==j.version){ location.replace(location.pathname+'?v='+encodeURIComponent(j.version)); }
  }
 }catch(e){}
})();
let subs=[],people=[],accounts=[],cats=[],curView='dash';
const $=id=>document.getElementById(id);
const fmt=n=>{n=+n;const s=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return n<0?`(${s})`:s};
const cls=n=>+n<0?'num neg':'num';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function groupedSubOpts(sel,excl){
 let h='';
 cats.forEach(c=>{
  const list=subs.filter(s=>s.active&&s.id!==excl&&s.categories?.name===c.name);
  if(!list.length)return;
  h+=`<optgroup label="${esc(c.name)}">`+list.map(s=>`<option value="${s.id}" ${sel==s.id?'selected':''}>${esc(s.name)}</option>`).join('')+`</optgroup>`;});
 return h;}

sb.auth.onAuthStateChange((ev,sess)=>{ if(sess){$('login').classList.add('hide');$('app').classList.remove('hide');$('who').textContent=sess.user.email;boot();} else {$('app').classList.add('hide');$('login').classList.remove('hide');} });

async function signIn(){ $('lmsg').textContent='...';
 const {error}=await sb.auth.signInWithPassword({email:$('em').value.trim(),password:$('pw').value});
 $('lmsg').textContent=error?error.message:''; }

async function setPw(){ const p=prompt('New password (min 8 chars):'); if(!p)return;
 const {error}=await sb.auth.updateUser({password:p}); alert(error?error.message:'Password updated.'); }

let booted=false;
async function boot(){ if(booted)return; booted=true;
 const [s,p,a,c]=await Promise.all([
  sb.from('subcategories').select('id,name,monthly_budget,active,categories(name,is_income)').order('name'),
  sb.from('people').select('*').order('id'),
  sb.from('accounts').select('*').order('id'),
  sb.from('categories').select('*').order('name')]);
 subs=s.data||[];people=p.data||[];accounts=a.data||[];cats=c.data||[];
 show('dash'); }

function show(v){ curView=v;
 ['dash','tx','bk','rp'].forEach(x=>{$('v-'+x).classList.toggle('hide',x!==v);$('t-'+x).classList.toggle('on',x===v);});
 ({dash:renderDash,tx:renderTx,bk:renderBk,rp:renderRp})[v](); }

/* ---------- DASHBOARD ---------- */
async function renderDash(){
 const el=$('v-dash'); el.innerHTML='<p class="muted">Loading…</p>';
 const [d,me,st,ip,bs]=await Promise.all([
  sb.from('dashboard').select('*').single(),
  sb.from('months_elapsed').select('*').single(),
  sb.from('settings').select('*'),
  sb.from('income_plan').select('*'),
  sb.from('bucket_status').select('category,subcategory,monthly_budget')]);
 const dash=d.data||{}, months=me.data?.months||0;
 const asof=(st.data||[]).find(r=>r.key==='balance_asof')?.value||'not set';
 const today=new Date(), mstart=today.toISOString().slice(0,8)+'01';
 const {data:mtx}=await sb.from('transactions').select('amount,person_id,subcategory_id,is_transfer,subcategories(categories(name,is_income))').gte('trans_date',mstart);
 let spent=0,byP={},inc=0;
 (mtx||[]).forEach(t=>{ if(t.is_transfer)return; const isInc=t.subcategories?.categories?.is_income;
  if(isInc){inc+=-t.amount;return;} spent+=+t.amount; const pid=t.person_id||0; byP[pid]=(byP[pid]||0)+ +t.amount; });
 const pname=id=>people.find(p=>p.id==id)?.name||'Unassigned';
 const _t=new Date(); const curMonthISO=new Date(_t.getFullYear(),_t.getMonth(),1).toISOString().slice(0,10);
 const incRows=ip.data||[];
 const _vers=[...new Set(incRows.map(r=>String(r.effective_month).slice(0,10)))].filter(m=>m<=curMonthISO).sort();
 const _activeV=_vers.length?_vers[_vers.length-1]:null;
 const expIncome=_activeV?incRows.filter(r=>String(r.effective_month).slice(0,10)===_activeV).reduce((s,r)=>s+ +r.monthly_amount,0):0;
 const totBudget=(bs.data||[]).reduce((s,r)=>s+ +r.monthly_budget,0);
 const diff=expIncome-totBudget;
 const _catMap={}, _subMap={};
 (bs.data||[]).forEach(r=>{ const c=r.category, amt=+r.monthly_budget||0; if(amt<=0)return; _catMap[c]=(_catMap[c]||0)+amt; (_subMap[c]=_subMap[c]||[]).push({name:r.subcategory,amount:amt}); });
 window.PIE_CATS=Object.entries(_catMap).map(([name,amount])=>({name,amount}));
 window.PIE_SUBS=_subMap;
 const _maxV=Math.max(expIncome,totBudget,Math.abs(diff),1);
 const _bh=v=>Math.max(2,Math.round(Math.abs(v)/_maxV*150));
 const barCard=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3>This month — income vs budget</h3><button class="btn sec" style="font-size:13px;padding:5px 9px" onclick="openIncomeModal()">✎ Expected income</button></div><div style="display:flex;gap:28px;align-items:flex-end;justify-content:center;height:210px"><div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%"><div style="font-weight:600;margin-bottom:4px">$${fmt(expIncome)}</div><div style="width:66px;height:${_bh(expIncome)}px;background:var(--green);border-radius:6px 6px 0 0"></div><div class="muted" style="margin-top:6px">Expected income</div></div><div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%"><div style="font-weight:600;margin-bottom:4px">$${fmt(totBudget)}</div><div style="width:66px;height:${_bh(totBudget)}px;background:var(--acc);border-radius:6px 6px 0 0"></div><div class="muted" style="margin-top:6px">Budgeted</div></div><div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%"><div style="font-weight:600;margin-bottom:4px" class="${diff<0?'neg':'pos'}">$${fmt(diff)}</div><div style="width:66px;height:${_bh(diff)}px;background:${diff<0?'var(--red)':'var(--green)'};border-radius:6px 6px 0 0"></div><div class="muted" style="margin-top:6px">Difference</div></div></div>${_activeV?'':'<p class="muted" style="text-align:center;margin-top:8px">No expected income entered yet — click “✎ Expected income” to add your sources.</p>'}</div>`;
 el.innerHTML=`
 ${dash.uncategorized_count>0?`<div class="warn">⚠ ${dash.uncategorized_count} uncategorized transactions — <a href="#" onclick="show('tx');return false">categorize them</a></div>`:''}
 <div class="grid">
  <div class="card kpi"><div class="lbl">Checking balance</div><div class="big">$${fmt(dash.checking_balance)}</div>
   <div class="muted">as of ${esc(asof)} — <a href="#" onclick="editBal();return false">update</a></div></div>
  <div class="card kpi"><div class="lbl">Set aside in buckets</div><div class="big">$${fmt(dash.total_set_aside)}</div>
   <div class="muted">${months} months since Jan 2026</div></div>
  <div class="card kpi"><div class="lbl">Safe to spend</div><div class="big ${+dash.safe_to_spend<0?'neg':'pos'}">$${fmt(dash.safe_to_spend)}</div>
   <div class="muted">checking − buckets</div></div>
 </div>
 ${barCard}
 <div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3 id="pieTitle">Budgeted by category</h3><button id="pieBack" class="btn sec" style="font-size:13px;padding:5px 9px;display:none" onclick="renderPie('cats')">← All categories</button></div><div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center"><div style="flex:0 0 280px;max-width:100%;height:280px;position:relative"><canvas id="pieCanvas"></canvas></div><div id="pieLegend" style="flex:1;min-width:220px;font-size:13px"></div></div><p class="muted" style="margin-top:8px">Double-click a slice — or click a category in the legend — to drill into its subcategories.</p></div>
 <div class="card"><h3 style="margin-bottom:8px">This month</h3>
  <table><tr><th>Spent</th><th class="num">$</th></tr>
  <tr><td>Total spending</td><td class="${cls(spent)}">$${fmt(spent)}</td></tr>
  <tr><td>Income recorded</td><td class="num pos">$${fmt(inc)}</td></tr></table></div>`;
 renderPie('cats');
}
function openIncomeModal(){ loadIncomeModal(); }
async function loadIncomeModal(){
 const {data}=await sb.from('income_plan').select('*').order('effective_month');
 const rows=data||[];
 const t=new Date(); const curISO=new Date(t.getFullYear(),t.getMonth(),1).toISOString().slice(0,10);
 const versions=[...new Set(rows.map(r=>String(r.effective_month).slice(0,10)))].sort();
 const activeV=versions.filter(m=>m<=curISO).slice(-1)[0] || versions.slice(-1)[0] || null;
 const items = activeV? rows.filter(r=>String(r.effective_month).slice(0,10)===activeV).map(r=>({source:r.source,amount:+r.monthly_amount})) : [{source:'',amount:''}];
 const eff = versions.length? new Date(t.getFullYear(),t.getMonth()+1,1).toISOString().slice(0,7) : curISO.slice(0,7);
 INC={items,eff};
 drawIncome(); }
function recalcIncTotal(){ const el=$('incTotal'); if(el) el.textContent=fmt(INC.items.reduce((s,r)=>s+(parseFloat(r.amount)||0),0)); }
function drawIncome(){
 let ov=$('incov');
 if(!ov){ov=document.createElement('div');ov.id='incov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:12px';
  document.body.appendChild(ov);}
 const total=INC.items.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
 const rowsHtml=INC.items.map((r,i)=>`<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center"><input placeholder="source (e.g. Social Security)" value="${esc(r.source)}" style="flex:2;min-width:0" oninput="INC.items[${i}].source=this.value"><input type="number" step="0.01" placeholder="amount" value="${r.amount}" style="flex:1;min-width:0" oninput="INC.items[${i}].amount=this.value;recalcIncTotal()"><button class="btn sec" title="Remove this source" style="flex:0 0 auto" onclick="INC.items.splice(${i},1);drawIncome()">✕</button></div>`).join('');
 ov.innerHTML=`<div class="card" style="max-width:480px;width:100%;max-height:90vh;overflow-y:auto"><h3 style="margin-bottom:4px">Expected monthly income</h3><p class="muted" style="margin-bottom:12px">List each income source and its monthly amount. Applies from the month you choose; earlier months keep their own plan.</p><label class="muted" style="display:block;margin-bottom:4px">Effective from</label><input id="incEff" type="month" value="${INC.eff}" style="width:100%;margin-bottom:12px" onchange="INC.eff=this.value">${rowsHtml}<button class="btn sec" style="margin:4px 0 10px" onclick="INC.items.push({source:'',amount:''});drawIncome()">+ Add source</button><p style="font-weight:700;margin-bottom:12px">Total: $<span id="incTotal">${fmt(total)}</span>/month</p><div style="display:flex;gap:8px"><button class="btn" onclick="saveIncome()">Save</button><button class="btn sec" onclick="$('incov').remove()">Cancel</button></div></div>`; }
async function saveIncome(){
 const eff=$('incEff').value; if(!/^\d{4}-\d{2}$/.test(eff))return alert('Pick an effective month.');
 const rows=INC.items.filter(r=>(r.source||'').trim() && !isNaN(parseFloat(r.amount)));
 if(!rows.length)return alert('Add at least one source with an amount.');
 const names=rows.map(r=>r.source.trim().toLowerCase());
 if(new Set(names).size!==names.length)return alert('Two sources have the same name — please make them distinct.');
 const em=eff+'-01';
 await sb.from('income_plan').delete().eq('effective_month',em);
 const ins=rows.map(r=>({effective_month:em,source:r.source.trim(),monthly_amount:parseFloat(r.amount)}));
 const {error}=await sb.from('income_plan').insert(ins);
 if(error)return alert(error.message);
 $('incov').remove(); renderDash(); }

let pieChart=null;
function renderPie(mode,catName){
 if(typeof Chart==='undefined'){ setTimeout(()=>renderPie(mode,catName),300); return; }
 const src = mode==='subs' ? (window.PIE_SUBS&&window.PIE_SUBS[catName]||[]) : (window.PIE_CATS||[]);
 const arr = src.slice().sort((a,b)=>b.amount-a.amount);
 const labels=arr.map(d=>d.name), vals=arr.map(d=>d.amount);
 const tot=vals.reduce((a,b)=>a+b,0)||1;
 const palette=['#1f4e78','#1e7d44','#c0392b','#e09f3e','#6a4c93','#2a9d8f','#e76f51','#457b9d','#8d99ae','#bc6c25','#606c38','#9d4edd','#ef476f','#118ab2','#ff9f1c','#3a86ff','#fb5607','#8338ec','#06d6a0','#d62828'];
 const colors=labels.map((_,i)=>palette[i%palette.length]);
 const cv=document.getElementById('pieCanvas'); if(!cv)return;
 if(pieChart){ try{pieChart.destroy();}catch(e){} }
 pieChart=new Chart(cv,{type:'pie',data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:1,borderColor:'#fff'}]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(c)=>c.label+': $'+fmt(c.parsed)+' ('+(c.parsed/tot*100).toFixed(1)+'%)'}}}}});
 const leg=document.getElementById('pieLegend');
 if(leg){ const _clk=mode==='cats'; leg.innerHTML=arr.map((d,i)=>`<div class="${_clk?'piecat':''}" ${_clk?`onclick="renderPie('subs',${JSON.stringify(d.name).replace(/"/g,'&quot;')})" title="Click to see subcategories"`:''} style="display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:2px"><span style="width:12px;height:12px;border-radius:3px;background:${colors[i]};display:inline-block;flex:0 0 12px"></span><span style="flex:1">${esc(d.name)}${_clk?' <span class="muted">›</span>':''}</span><span style="font-weight:600">$${fmt(d.amount)}</span><span style="width:46px;text-align:right;color:var(--ink);font-weight:500">${(d.amount/tot*100).toFixed(1)}%</span></div>`).join('')+`<div style="display:flex;gap:8px;margin-top:6px;border-top:1px solid var(--line);padding-top:6px"><span style="flex:1;font-weight:700">Total</span><span style="font-weight:700">$${fmt(tot)}</span><span style="width:46px"></span></div>`; }
 const title=document.getElementById('pieTitle'); if(title) title.textContent = mode==='subs' ? (catName+' — subcategories') : 'Budgeted by category';
 const back=document.getElementById('pieBack'); if(back) back.style.display = mode==='subs' ? '' : 'none';
 cv.ondblclick=(e)=>{ if(mode!=='cats')return; const pts=pieChart.getElementsAtEventForMode(e,'nearest',{intersect:true},true); if(pts.length){ renderPie('subs',labels[pts[0].index]); } };
}

let spendChart=null;
function _spendMonths(){ const t=new Date(); const a=[]; for(let i=11;i>=0;i--){ const d=new Date(t.getFullYear(),t.getMonth()-i,1); a.push(d.toISOString().slice(0,7)); } return a; }
function drawSpendChart(name, months, spendVals, budgetVals){
 const _spMonths=spendVals.filter(v=>v>0).length;
 const _spTotal=spendVals.reduce((a,b)=>a+b,0);
 const avgSpend=_spMonths?_spTotal/_spMonths:0;
 const avgVals=months.map(()=>+avgSpend.toFixed(2));
 const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
 const labels=months.map(m=>{ const pp=m.split('-'); return MN[(+pp[1])-1]+" '"+pp[0].slice(2); });
 let ov=$('spendov'); if(!ov){ov=document.createElement('div');ov.id='spendov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:12px';
  document.body.appendChild(ov);}
 ov.innerHTML=`<div class="card" style="max-width:660px;width:100%"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3>${esc(name)} — last 12 months</h3><button class="btn sec" style="font-size:13px;padding:5px 9px" onclick="$('spendov').remove()">Close</button></div><div style="height:300px;position:relative"><canvas id="spendCanvas"></canvas></div><p class="muted" style="margin-top:8px">Bars = actual spending; red line = budget; green dashed line = average <b>$${fmt(avgSpend)}/mo</b> across ${_spMonths} month${_spMonths==1?'':'s'} with spending.</p></div>`;
 const ctx=document.getElementById('spendCanvas');

async function openSpendChart(id,name){
 if(typeof Chart==='undefined'){ alert('Chart is still loading — try again in a moment.'); return; }
 const months=_spendMonths(); const startISO=months[0]+'-01';
 const [tx,spl,bsch]=await Promise.all([
  sb.from('transactions').select('trans_date,amount').eq('subcategory_id',id).eq('is_transfer',false).gte('trans_date',startISO),
  sb.from('transaction_splits').select('amount,transactions(trans_date)').eq('subcategory_id',id),
  sb.from('budget_schedule').select('start_month,monthly_budget').eq('subcategory_id',id).order('start_month')]);
 const spend={}; months.forEach(m=>spend[m]=0);
 (tx.data||[]).forEach(t=>{ const m=String(t.trans_date).slice(0,7); if(m in spend) spend[m]+= +t.amount; });
 (spl.data||[]).forEach(x=>{ const d=x.transactions&&x.transactions.trans_date; if(!d)return; const m=String(d).slice(0,7); if(m in spend) spend[m]+= +x.amount; });
 const sched=(bsch.data||[]).map(r=>({sm:String(r.start_month).slice(0,7),amt:+r.monthly_budget})).sort((a,b)=>a.sm<b.sm?-1:1);
 const sub=subs.find(x=>x.id==id);
 const budgetFor=(m)=>{ let a=sched.length?0:(sub?+sub.monthly_budget:0); for(const r of sched){ if(r.sm<=m) a=r.amt; } return a; };
 drawSpendChart(name, months, months.map(m=>+(spend[m]).toFixed(2)), months.map(m=>budgetFor(m)));
}
async function openCatSpendChart(catName){

  sb.from('transaction_splits').select('amount,subcategory_id,transactions(trans_date)').in('subcategory_id',subIds),

 (tx.data||[]).forEach(t=>{ const m=String(t.trans_date).slice(0,7); if(m in spend) spend[m]+= +t.amount; });
 (spl.data||[]).forEach(x=>{ const d=x.transactions&&x.transactions.trans_date; if(!d)return; const m=String(d).slice(0,7); if(m in spend) spend[m]+= +x.amount; });
 const bySub={}; (bsch.data||[]).forEach(r=>{ (bySub[r.subcategory_id]=bySub[r.subcategory_id]||[]).push({sm:String(r.start_month).slice(0,7),amt:+r.monthly_budget}); });

 window.SPLDONE=doneFn||null;
 const [{data:tx},{data:ex}]=await Promise.all([
  sb.from('transactions').select('*').eq('id',txId).single(),
  sb.from('transaction_splits').select('*').eq('transaction_id',txId).order('id')]);
 SPL={tx,rows:(ex||[]).map(s=>({subcategory_id:s.subcategory_id,amount:+s.amount,note:s.note||''}))};
 if(!SPL.rows.length)SPL.rows=[{subcategory_id:tx.subcategory_id||'',amount:'',note:''}];
 drawSplit(); }

function drawSplit(){
 let ov=$('splitov');
 if(!ov){ov=document.createElement('div');ov.id='splitov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:12px';
  document.body.appendChild(ov);}
 const t=SPL.tx, total=Math.abs(+t.amount);
 const alloc=SPL.rows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
 const remain=total-alloc;
 const opts=sel=>`<option value="">— pick —</option>`+groupedSubOpts(sel);
 ov.innerHTML=`<div class="card" style="max-width:560px;width:100%;max-height:90vh;overflow-y:auto">
  <h3 style="margin-bottom:4px">Split transaction</h3>
  <p class="muted" style="margin-bottom:10px">${esc(t.description)} — ${t.trans_date} — total $${fmt(total)}</p>
  ${SPL.rows.map((r,i)=>`<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
   <select style="flex:2;min-width:0" onchange="SPL.rows[${i}].subcategory_id=this.value">${opts(r.subcategory_id)}</select>
   <input style="flex:0 0 78px;min-width:0" type="number" step="0.01" placeholder="0.00" value="${r.amount}" oninput="SPL.rows[${i}].amount=this.value;recalcSplitTotals()">
   <input style="flex:1;min-width:0" placeholder="description (optional)" value="${esc(r.note)}" onchange="SPL.rows[${i}].note=this.value">
   <button class="btn sec" title="Delete this line" style="flex:0 0 auto" onclick="SPL.rows.splice(${i},1);drawSplit()">✕</button></div>`).join('')}
  <div style="display:flex;gap:8px;margin:10px 0;flex-wrap:wrap">
   <button class="btn sec" onclick="SPL.rows.push({subcategory_id:'',amount:'',note:''});drawSplit()">+ Row</button>
   <button class="btn sec" onclick="applyTemplate()">Apply template…</button>
   <button class="btn sec" onclick="saveTemplate()">Save as template</button></div>
  <p id="splitTot" style="font-weight:600;margin-bottom:10px" class="${remain<0?'neg':''}">Allocated: $${fmt(alloc)} &nbsp; Remaining: $${fmt(remain)} ${remain<0?'— OVER ALLOCATED':''}</p>
  <div style="display:flex;gap:8px">
   <button id="splitSave" class="btn" ${remain<0?'disabled style="opacity:.4"':''} onclick="saveSplit()">Save split</button>
   <button class="btn sec" onclick="unsplit()">Remove split</button>
   <button class="btn sec" onclick="$('splitov').remove()">Cancel</button></div></div>`; }

function recalcSplitTotals(){
 const total=Math.abs(+SPL.tx.amount);
 const alloc=SPL.rows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
 const remain=total-alloc;
 const p=$('splitTot'); if(p){ p.className=remain<0?'neg':''; p.innerHTML='Allocated: $'+fmt(alloc)+' &nbsp; Remaining: $'+fmt(remain)+(remain<0?' — OVER ALLOCATED':''); }
 const b=$('splitSave'); if(b){ b.disabled=remain<0; b.style.opacity=remain<0?'.4':''; } }
async function saveSplit(){
 const t=SPL.tx, total=Math.abs(+t.amount);
 const rows=SPL.rows.filter(r=>r.subcategory_id&&parseFloat(r.amount)>0);
 if(!rows.length)return alert('Add at least one row with a subcategory and amount.');
 const alloc=rows.reduce((s,r)=>s+parseFloat(r.amount),0);
 if(alloc-total>0.005)return alert(`Over-allocated: $${fmt(alloc)} of $${fmt(total)}.`);
 await sb.from('transaction_splits').delete().eq('transaction_id',t.id);
 const ins=rows.map(r=>({transaction_id:t.id,subcategory_id:+r.subcategory_id,amount:parseFloat(r.amount),note:r.note||null}));
 const {error}=await sb.from('transaction_splits').insert(ins);
 if(error)return alert(error.message);
 await sb.from('transactions').update({subcategory_id:null,is_transfer:false}).eq('id',t.id);
 $('splitov').remove(); (window.SPLDONE||loadTx)(); }

async function unsplit(){
 await sb.from('transaction_splits').delete().eq('transaction_id',SPL.tx.id);
 $('splitov').remove(); (window.SPLDONE||loadTx)(); }

async function saveTemplate(){
 const rows=SPL.rows.filter(r=>r.subcategory_id&&parseFloat(r.amount)>0);
 if(!rows.length)return alert('Nothing to save yet.');
 const name=prompt('Template name (e.g. "Rent check"):'); if(!name)return;
 const items=rows.map(r=>({subcategory_id:+r.subcategory_id,amount:parseFloat(r.amount)}));
 const {error}=await sb.from('split_templates').upsert({name:name.trim(),items},{onConflict:'name'});
 alert(error?error.message:'Template saved.'); }

async function applyTemplate(){
 const {data}=await sb.from('split_templates').select('*').order('name');
 if(!(data||[]).length)return alert('No templates saved yet.');
 const name=prompt('Which template?\n\n'+data.map(t=>'• '+t.name).join('\n'),data[0].name); if(!name)return;
 const tpl=data.find(t=>t.name.toLowerCase()===name.trim().toLowerCase());
 if(!tpl)return alert(`Template "${name}" not found.`);
 SPL.rows=tpl.items.map(i=>({subcategory_id:i.subcategory_id,amount:i.amount,note:''}));
 drawSplit(); }

    <td>${catSel(r.id,r.category)}</td>

    <td class="num">$${fmt(r.budgeted_to_date)}</td><td class="num">$${fmt(r.spent_to_date)}</td>
    <td class="num"><a href="#" title="Adjustment history" onclick="bucketLog(${r.id},'${esc(r.subcategory)}');return false">${+r.adjustments?'$'+fmt(r.adjustments):'—'}</a></td>
    <td class="${cls(r.balance)}" style="font-weight:600">$${fmt(r.balance)}</td>
    <td style="white-space:nowrap"><button class="btn sec" style="padding:2px 8px" title="Add/remove money" onclick="adjustBucket(${r.id},'${esc(r.subcategory)}')">+/−</button>
     <button class="btn sec" style="padding:2px 8px" title="Transfer to another bucket" onclick="transferBucket(${r.id},'${esc(r.subcategory)}')">⇆</button></td></tr>`; });
 });
 cats.filter(c=>!c.is_income&&!groups[c.name]).forEach(c=>{

   <td colspan="6" class="muted">no subcategories</td></tr>`;});
 el.innerHTML=`<div class="flt stick">
  <button class="btn" onclick="addCat()">+ Category</button>
  <button class="btn" onclick="addSub()">+ Subcategory</button>
  <span class="muted" style="align-self:center">Click a category to open it. Inside: click a subcategory for its ledger, ✎ to rename, $ to edit, +/− to adjust, ⇆ to transfer.</span></div>
 <div class="card" style="overflow-x:auto"><p class="muted" style="margin-bottom:8px">Each bucket accrues its monthly amount since Jan 2026; spending draws it down.</p>
 <table><tr><th>Category / Subcategory</th><th></th><th class="num">Monthly</th><th class="num">Budgeted to date</th><th class="num">Spent</th><th class="num">Adjust</th><th class="num">Balance</th><th></th></tr>
 ${rows}<tr style="font-weight:700;background:#f0f6ef"><td>TOTAL</td><td></td><td class="num">$${fmt(tot.b)}</td><td class="num">$${fmt(tot.btd)}</td><td class="num">$${fmt(tot.sp)}</td><td class="num">$${fmt(tot.adj)}</td><td class="${cls(tot.bal)}">$${fmt(tot.bal)}</td><td></td></tr></table></div>`; }

function editBudget(id,name,cur){ openBudgetModal(id,name); }
function ymCur(){ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),1).toISOString().slice(0,7); }
function fmtYM(ym){ const a=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; const pp=String(ym).split('-'); return (a[(+pp[1]||1)-1]||'')+' '+pp[0]; }
async function openBudgetModal(subId,name){
 const {data}=await sb.from('budget_schedule').select('*').eq('subcategory_id',subId).order('start_month');
 let rows=(data||[]).map(r=>({start:String(r.start_month).slice(0,7),amount:+r.monthly_budget}));
 if(!rows.length){const s=subs.find(x=>x.id==subId);rows=[{start:'2026-01',amount:s?+s.monthly_budget:0}];}
 BUD={subId,name,rows};
 drawBudget(); }
function budCurAmt(){ const cur=ymCur(); const sorted=BUD.rows.slice().sort((a,b)=>a.start<b.start?-1:1); let a=sorted.length?sorted[0].amount:0; for(const r of sorted){ if(r.start<=cur) a=r.amount; } return a; }
function loadBudPeriod(i){ const r=BUD.rows[i]; if(!r)return; const a=$('budAmt'),m=$('budMonth'); if(a)a.value=r.amount; if(m)m.value=r.start; }
function drawBudget(){
 let ov=$('budov');
 if(!ov){ov=document.createElement('div');ov.id='budov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:12px';
  document.body.appendChild(ov);}
 const sorted=BUD.rows.slice().sort((a,b)=>a.start<b.start?-1:1);
 const hist=sorted.map(r=>{ const idx=BUD.rows.indexOf(r); return `<div style="display:flex;gap:8px;align-items:center;margin-bottom:4px"><span style="flex:1">From ${fmtYM(r.start)}</span><span style="font-weight:600">$${fmt(r.amount)}</span> <a href="#" title="Load into the form to edit" onclick="loadBudPeriod(${idx});return false">✎</a>${BUD.rows.length>1?` <a href="#" class="neg" title="Delete this change" onclick="delBudPeriod(${idx});return false">✕</a>`:''}</div>`; }).join('');
 ov.innerHTML=`<div class="card" style="max-width:440px;width:100%;max-height:90vh;overflow-y:auto"><h3 style="margin-bottom:4px">Budget — ${esc(BUD.name)}</h3><p class="muted" style="margin-bottom:12px">Current: <b>$${fmt(budCurAmt())}/month</b>. Enter a new amount and the month it should start from — earlier months keep their amount.</p><label class="muted" style="display:block;margin-bottom:4px">New monthly amount</label><input id="budAmt" type="number" step="0.01" placeholder="e.g. 150" style="width:100%;margin-bottom:10px"><label class="muted" style="display:block;margin-bottom:4px">Starting from</label><input id="budMonth" type="month" value="${ymCur()}" style="width:100%;margin-bottom:14px"><div style="display:flex;gap:8px;margin-bottom:14px"><button class="btn" onclick="applyBudgetChange()">Save change</button><button class="btn sec" onclick="$('budov').remove()">Close</button></div><div style="border-top:1px solid var(--line);padding-top:10px"><p class="muted" style="margin-bottom:6px">Scheduled amounts (history):</p>${hist}</div></div>`; }
async function applyBudgetChange(){
 const amt=parseFloat(($('budAmt').value||'').replace(/[$,]/g,''));
 const m=$('budMonth').value;
 if(!/^\d{4}-\d{2}$/.test(m))return alert('Pick the month this amount should start.');
 if(isNaN(amt))return alert('Enter a dollar amount.');
 const {error}=await sb.from('budget_schedule').upsert({subcategory_id:BUD.subId,start_month:m+'-01',monthly_budget:amt},{onConflict:'subcategory_id,start_month'});
 if(error)return alert(error.message);
 await afterBudChange(); }
async function delBudPeriod(i){
 const r=BUD.rows[i]; if(!r)return;
 if(BUD.rows.length<=1)return alert('Keep at least one amount.');
 if(!confirm('Delete the change starting '+fmtYM(r.start)+'? Months from then on revert to the previous amount.'))return;
 const {error}=await sb.from('budget_schedule').delete().eq('subcategory_id',BUD.subId).eq('start_month',r.start+'-01');
 if(error)return alert(error.message);
 await afterBudChange(); }
async function afterBudChange(){
 const {data}=await sb.from('budget_schedule').select('*').eq('subcategory_id',BUD.subId).order('start_month');
 BUD.rows=(data||[]).map(r=>({start:String(r.start_month).slice(0,7),amount:+r.monthly_budget}));
 const ca=budCurAmt();
 await sb.from('subcategories').update({monthly_budget:ca}).eq('id',BUD.subId);
 const s=subs.find(x=>x.id==BUD.subId); if(s)s.monthly_budget=ca;
 drawBudget(); renderBk(); }

async function delSub(id,name){
 const [tx,sp,adj]=await Promise.all([
  sb.from('transactions').select('id',{count:'exact',head:true}).eq('subcategory_id',id),
  sb.from('transaction_splits').select('id',{count:'exact',head:true}).eq('subcategory_id',id),
  sb.from('bucket_adjustments').select('id',{count:'exact',head:true}).eq('subcategory_id',id)]);
 const nTx=tx.count||0, nSp=sp.count||0, nAdj=adj.count||0;
 if(nTx+nSp===0){
  if(!confirm(`Delete subcategory "${name}"?${nAdj?` Its ${nAdj} adjustment(s) will also be deleted.`:''}`))return;
  await sb.from('bucket_adjustments').delete().eq('subcategory_id',id);
  await sb.from('rules').delete().eq('subcategory_id',id);
  const {error}=await sb.from('subcategories').delete().eq('id',id);
  if(error)return alert(error.message);
  await refreshMeta(); renderBk(); return; }
 window.MV={id,name,nTx,nSp,nAdj};
 const ov=document.createElement('div'); ov.id='mvov';
 ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:12px';
 ov.innerHTML=`<div class="card" style="max-width:460px;width:100%">
  <h3 style="margin-bottom:6px">Delete "${esc(name)}"</h3>
  <p class="muted" style="margin-bottom:10px">It has ${nTx} transaction(s), ${nSp} split piece(s), and ${nAdj} adjustment(s). Pick where to move them — then "${esc(name)}" will be deleted.</p>
  <label class="muted" style="font-size:12px">Move everything to</label>
  <select id="mv-target" style="width:100%;margin-bottom:12px">${groupedSubOpts(null,id)}</select>
  <div style="display:flex;gap:8px"><button class="btn" onclick="confirmDelSub()">Move &amp; delete</button>
  <button class="btn sec" onclick="$('mvov').remove()">Cancel</button></div></div>`;
 document.body.appendChild(ov); }

async function confirmDelSub(){
 const {id,name}=window.MV, target=+$('mv-target').value;
 let e;
 e=(await sb.from('transactions').update({subcategory_id:target}).eq('subcategory_id',id)).error; if(e)return alert(e.message);
 e=(await sb.from('transaction_splits').update({subcategory_id:target}).eq('subcategory_id',id)).error; if(e)return alert(e.message);
 e=(await sb.from('bucket_adjustments').update({subcategory_id:target}).eq('subcategory_id',id)).error; if(e)return alert(e.message);
 e=(await sb.from('rules').update({subcategory_id:target}).eq('subcategory_id',id)).error; if(e)return alert(e.message);
 e=(await sb.from('subcategories').delete().eq('id',id)).error; if(e)return alert(e.message);
 $('mvov').remove(); await refreshMeta(); renderBk(); }

async function moveSub(id,newCatId){
 const {error}=await sb.from('subcategories').update({category_id:+newCatId}).eq('id',id);
 if(error)return alert(error.message);
 await refreshMeta(); renderBk(); }

/* ---------- REPORTS ---------- */
async function renderRp(){
 const el=$('v-rp'); el.innerHTML='<p class="muted">Loading…</p>';
 const [{data,error},{data:spl}]=await Promise.all([
  sb.from('transactions').select('id,trans_date,amount,is_transfer,person_id,subcategories(name,monthly_budget,categories(name,is_income))').eq('is_transfer',false),
  sb.from('transaction_splits').select('transaction_id,amount,subcategories(name,categories(name,is_income)),transactions(trans_date,person_id)')]);
 if(error){el.innerHTML=`<p class="neg">${esc(error.message)}</p>`;return;}
 const splitParents=new Set((spl||[]).map(s=>s.transaction_id));
 const byMC={},months=new Set(),byMP={};
 (spl||[]).forEach(s=>{ const c=s.subcategories?.categories; if(c?.is_income)return;
  const m=s.transactions.trans_date.slice(0,7); months.add(m);
  const cat=c?.name||'(uncategorized)';
  byMC[cat]=byMC[cat]||{}; byMC[cat][m]=(byMC[cat][m]||0)+ +s.amount;
  const p=s.transactions.person_id||0; byMP[p]=byMP[p]||{}; byMP[p][m]=(byMP[p][m]||0)+ +s.amount; });
 (data||[]).forEach(t=>{ if(splitParents.has(t.id))return;
  const c=t.subcategories?.categories; if(c?.is_income)return;
  const m=t.trans_date.slice(0,7); months.add(m);
  const cat=c?.name||'(uncategorized)';
  byMC[cat]=byMC[cat]||{}; byMC[cat][m]=(byMC[cat][m]||0)+ +t.amount;
  const p=t.person_id||0; byMP[p]=byMP[p]||{}; byMP[p][m]=(byMP[p][m]||0)+ +t.amount; });
 const ms=[...months].sort();
 const pname=id=>people.find(p=>p.id==id)?.name||'Unassigned';
 const cats=Object.keys(byMC).sort((a,b)=>{const ta=ms.reduce((s,m)=>s+(byMC[a][m]||0),0),tb=ms.reduce((s,m)=>s+(byMC[b][m]||0),0);return tb-ta;});
 const maxTot=Math.max(...cats.map(c=>ms.reduce((s,m)=>s+(byMC[c][m]||0),0)),1);
 el.innerHTML=`<div class="card" style="overflow-x:auto"><h3 style="margin-bottom:8px">Spending by category by month</h3>
 <table><tr><th>Category</th>${ms.map(m=>`<th class="num">${m}</th>`).join('')}<th class="num">Total</th><th style="width:30%"></th></tr>
 ${cats.map(c=>{const tot=ms.reduce((s,m)=>s+(byMC[c][m]||0),0);
  return `<tr><td>${esc(c)}</td>${ms.map(m=>`<td class="num">${byMC[c][m]?'$'+fmt(byMC[c][m]):''}</td>`).join('')}
  <td class="num" style="font-weight:600">$${fmt(tot)}</td><td><div class="bar"><i style="width:${Math.round(tot/maxTot*100)}%"></i></div></td></tr>`;}).join('')}
 </table></div>`; }
</script>
